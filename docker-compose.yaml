services:

  php:
    build: ./php
    container_name: php_server
    ports:
      - "8080:80"          
    volumes:
      - ./app:/var/www/html  
    depends_on:
      db:
        condition: service_healthy
    networks:
      - webnet
 
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: 5cinf
      MYSQL_USER: utente
      MYSQL_PASSWORD: admin
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql          
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql  
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-padmin"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - webnet

  
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: always
    ports:
      - "8081:80"          
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: admin
      PMA_PORT: 3307
    depends_on:
      - db
    networks:
      - webnet

volumes:
  db_data:

networks:
  webnet: